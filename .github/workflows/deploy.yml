name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure wallet
        run: |
          if [ -n "${{ secrets.PRIVATE_KEY }}" ]; then
            echo "PRIVATE_KEY=${{ secrets.PRIVATE_KEY }}" >> "$GITHUB_ENV"
            echo "DEPLOYER=$(cast wallet address "${{ secrets.PRIVATE_KEY }}")" >> "$GITHUB_ENV"
          else
            OUT=$(cast wallet new)
            echo "$OUT"
            PK=$(echo "$OUT" | awk '/Private key:/ {print $2}')
            echo "PRIVATE_KEY=$PK" >> "$GITHUB_ENV"
            echo "DEPLOYER=$(echo "$OUT" | awk '/Address:/ {print $2}')" >> "$GITHUB_ENV"
          fi

      - name: Try faucets
        run: |
          curl -sS -X POST "https://faucets.chain.link/api/faucet" \
            -H "Content-Type: application/json" \
            -d "{\"network\":\"sepolia\",\"token\":\"native\",\"address\":\"$DEPLOYER\"}" || true
          sleep 25

      - name: Deploy contract (if funded)
        id: contract
        env:
          SEPOLIA_RPC_URL: https://ethereum-sepolia-rpc.publicnode.com
          HOUSE_SEED_ETH: 1000000000000000000
        run: |
          BAL=$(cast balance "$DEPLOYER" --rpc-url "$SEPOLIA_RPC_URL")
          echo "balance=$BAL"
          if [ "$BAL" = "0" ]; then
            echo "address=" >> "$GITHUB_OUTPUT"
            echo "Fund deployer on Sepolia: $DEPLOYER"
            exit 0
          fi
          forge script script/Deploy.s.sol --rpc-url "$SEPOLIA_RPC_URL" --broadcast -vvv
          ADDR=$(python3 - <<'PY'
          import json
          from pathlib import Path
          files = sorted(Path("broadcast/Deploy.s.sol").rglob("run-*.json"))
          data = json.loads(files[-1].read_text())
          for tx in data["transactions"]:
              if tx.get("contractName") == "CryptoCasino":
                  print(tx["contractAddress"])
                  break
          PY
          )
          echo "address=$ADDR" >> "$GITHUB_OUTPUT"

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_CASINO_ADDRESS: ${{ steps.contract.outputs.address || secrets.CASINO_ADDRESS || '0x0000000000000000000000000000000000000000' }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: c4f8b2e1d7a9460f9b3e2c1d8a7f6e5b
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy-pages:
    needs: deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
